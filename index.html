<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Characters in Vibes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg-primary: #181819;
    --fill-secondary-elevated: rgba(255,255,255,0.12);
    --fill-primary-elevated: rgba(255,255,255,0.12);
    --fill-blur-thick: rgba(56,56,56,0.8);
    --text-primary: #fff;
    --text-secondary: rgba(242,247,255,0.53);
    --text-tertiary: rgba(241,246,255,0.38);
    --fill-highlight: rgba(255,255,255,0.06);
    --border-subtle: #686a6e;
  }

  body {
    font-family: -apple-system, 'SF Pro', 'Helvetica Neue', sans-serif;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    gap: 32px;
  }

  /* Version switcher */
  .version-panel {
    width: 200px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex-shrink: 0;
  }
  .version-panel-title {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .version-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    width: 100%;
    text-align: left;
  }
  .version-option:hover {
    background: rgba(255,255,255,0.08);
  }
  .version-option.active {
    border-color: rgba(130,100,255,0.5);
    background: rgba(130,100,255,0.1);
  }
  .version-radio {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.25);
    flex-shrink: 0;
    position: relative;
  }
  .version-option.active .version-radio {
    border-color: #8264ff;
  }
  .version-option.active .version-radio::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #8264ff;
  }
  .version-label {
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.7);
    line-height: 18px;
  }
  .version-option.active .version-label {
    color: white;
  }
  .version-desc {
    font-size: 11px;
    font-weight: 400;
    color: rgba(255,255,255,0.35);
    line-height: 14px;
    margin-top: 1px;
  }
  .version-option.active .version-desc {
    color: rgba(255,255,255,0.5);
  }
  .version-text {
    display: flex;
    flex-direction: column;
  }

  .phone {
    width: 393px;
    height: 852px;
    background: var(--bg-primary);
    border-radius: 52px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.16);
  }

  .scroll-area {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 21px 16px 0;
    height: 62px;
    flex-shrink: 0;
  }
  .status-bar .time {
    font-size: 17px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .status-bar .status-icons {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .status-bar .status-icons svg { height: 14px; fill: white; }

  /* Navbar */
  .navbar {
    display: flex;
    align-items: center;
    padding: 0 16px;
    height: 52px;
    flex-shrink: 0;
    position: relative;
  }
  .nav-btn {
    width: 44px;
    height: 44px;
    border-radius: 999px;
    background: var(--fill-blur-thick);
    backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.02), 0 8px 40px rgba(0,0,0,0.08);
    border: none;
    cursor: pointer;
    flex-shrink: 0;
  }
  .nav-btn svg { width: 20px; height: 20px; }
  .nav-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--text-primary);
    margin-left: 16px;
  }
  .nav-right {
    margin-left: auto;
  }
  .nav-right.hidden { visibility: hidden; }

  /* Segmented control */
  .seg-control-wrap {
    padding: 12px 16px 0;
    flex-shrink: 0;
  }
  .seg-control {
    display: flex;
    background: var(--fill-secondary-elevated);
    border-radius: 1000px;
    padding: 4px;
    position: relative;
  }
  .seg-btn {
    flex: 1;
    height: 28px;
    min-width: 80px;
    border: none;
    background: transparent;
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 400;
    cursor: pointer;
    border-radius: 1000px;
    position: relative;
    z-index: 1;
    transition: font-weight 0.15s;
  }
  .seg-btn.active { font-weight: 500; }
  .seg-pill {
    position: absolute;
    top: 4px;
    height: 28px;
    border-radius: 1000px;
    background: var(--fill-primary-elevated);
    backdrop-filter: blur(18px);
    box-shadow: inset 0 1px 0 0 var(--fill-highlight),
                0 0 2px rgba(0,0,0,0.02), 0 0 6px rgba(0,0,0,0.03), 0 6px 30px rgba(0,0,0,0.07);
    transition: left 0.25s cubic-bezier(0.4, 0, 0.2, 1), width 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 0;
  }

  /* Tab content */
  .tab-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Section header */
  .section-header {
    padding: 6px 24px;
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 20px;
  }

  /* Featured card */
  .featured-section {
    padding-top: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .featured-carousel {
    width: 353px;
    height: 353px;
    position: relative;
    overflow: hidden;
    border-radius: 28px;
    box-shadow: 0 1px 1.5px rgba(0,0,0,0.02), 0 4px 10px rgba(0,0,0,0.04);
    cursor: pointer;
  }
  .featured-slide {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }
  .featured-slide.active { opacity: 1; pointer-events: auto; }
  .featured-slide-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .featured-dots {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
  }
  .featured-dot {
    width: 6px; height: 6px;
    border-radius: 44px;
    background: white;
    opacity: 0.3;
    transition: opacity 0.25s, width 0.25s, box-shadow 0.25s;
  }
  .featured-dot.active {
    opacity: 1;
    box-shadow: 0 0 8px rgba(255,255,255,0.7);
  }
  .featured-dot.small {
    width: 4px; height: 4px;
  }

  /* Character list */
  .char-list { padding: 0 20px; }
  .char-row {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 8px 0;
  }
  .char-avatar {
    width: 48px; height: 48px;
    border-radius: 99px;
    object-fit: cover;
    flex-shrink: 0;
    box-shadow: 0 0 2px rgba(0,0,0,0.02), 0 0 10px rgba(0,0,0,0.03), 0 10px 50px rgba(0,0,0,0.07);
  }
  .char-info {
    flex: 1;
    min-width: 0;
    padding-left: 8px;
  }
  .char-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 20px;
  }
  .char-author {
    font-size: 15px;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 20px;
  }
  .char-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .vibe-btn {
    width: 42px; height: 20px;
    border: 1px solid var(--border-subtle);
    border-radius: 6px;
    background: transparent;
    color: white;
    font-size: 11px;
    font-weight: 400;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 13px;
  }
  .action-btn {
    width: 36px; height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    cursor: pointer;
    border-radius: 50px;
  }
  .action-btn svg { width: 20px; height: 20px; }

  .divider {
    height: 0.5px;
    background: rgba(255,255,255,0.08);
  }

  .spacer-bottom { height: 40px; }

  /* Row animation */
  .char-row-wrap {
    overflow: hidden;
  }
  .char-row-wrap.removing {
    transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease-out;
    max-height: 0 !important;
    opacity: 0;
  }

  /* Empty state */
  .empty-state {
    padding: 60px 24px;
    text-align: center;
    color: var(--text-tertiary);
    font-size: 15px;
  }

  /* Toast */
  .toast {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--fill-blur-thick);
    backdrop-filter: blur(20px);
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 400;
    padding: 10px 20px;
    border-radius: 100px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 10;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Sidebar drawer */
  .sidebar-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .sidebar-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  .sidebar {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 317px;
    background: #28292b;
    z-index: 30;
    display: flex;
    flex-direction: column;
    transform: translateX(-100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  }
  .sidebar.open {
    transform: translateX(0);
  }

  .sidebar-nav {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 68px 10px 0;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    border-radius: 20px;
    cursor: pointer;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
  }
  .sidebar-item:hover {
    background: rgba(255,255,255,0.06);
  }
  .sidebar-item.active {
    background: #28292b;
  }
  .sidebar-item-icon {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sidebar-item-icon img {
    width: 20px;
    height: 20px;
    object-fit: contain;
  }
  .sidebar-item-icon svg {
    width: 24px;
    height: 24px;
  }
  .sidebar-item-label {
    font-family: -apple-system, 'SF Pro', 'Helvetica Neue', sans-serif;
    font-size: 16px;
    font-weight: 600;
    font-style: normal;
    color: #f3f4f5;
    line-height: 24px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-feature-settings: 'liga' off, 'clig' off;
  }

  .sidebar-sub-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px 6px 20px;
    border-radius: 20px;
    min-height: 36px;
    cursor: pointer;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
  }
  .sidebar-sub-item:hover {
    background: rgba(255,255,255,0.06);
  }
  .sidebar-sub-avatar {
    width: 24px;
    height: 24px;
    border-radius: 48px;
    object-fit: cover;
    flex-shrink: 0;
  }
  .sidebar-sub-label {
    font-family: -apple-system, 'SF Pro', 'Helvetica Neue', sans-serif;
    font-size: 16px;
    font-weight: 600;
    font-style: normal;
    color: #f3f4f5;
    line-height: 24px;
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-feature-settings: 'liga' off, 'clig' off;
  }

  .sidebar-divider {
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 0 10px;
  }

  .sidebar-history {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 32px 10px 0;
  }
  .sidebar-history-label {
    font-size: 16px;
    font-weight: 600;
    color: #686a6e;
    line-height: 24px;
    padding: 8px 10px;
    height: 20px;
    display: flex;
    align-items: center;
  }
  .sidebar-history-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    border-radius: 20px;
    min-height: 36px;
    cursor: pointer;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
  }
  .sidebar-history-item:hover {
    background: rgba(255,255,255,0.06);
  }
  .sidebar-history-item.pinned {
    background: #28292b;
  }
  .sidebar-history-item-label {
    font-size: 17px;
    font-weight: 400;
    color: #f3f4f5;
    line-height: 22px;
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sidebar-history-item .sidebar-pin-icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }

  .sidebar-bottom {
    flex: 0 0 auto;
    border-top: 1px solid #323435;
    display: flex;
    align-items: center;
    padding: 8px 10px 44px 10px;
  }
  .sidebar-bottom-inner {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
    padding: 6px 10px;
    border-radius: 20px;
    cursor: pointer;
    border: none;
    background: transparent;
  }
  .sidebar-bottom-inner:hover {
    background: rgba(255,255,255,0.06);
  }
  .sidebar-bottom-avatar {
    width: 44px;
    height: 44px;
    border-radius: 44px;
    object-fit: cover;
    flex-shrink: 0;
  }
  .sidebar-bottom-label {
    font-family: -apple-system, 'SF Pro', 'Helvetica Neue', sans-serif;
    font-size: 16px;
    font-weight: 600;
    font-style: normal;
    color: #f3f4f5;
    line-height: 24px;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-feature-settings: 'liga' off, 'clig' off;
  }
  .sidebar-bottom-settings {
    flex-shrink: 0;
    padding: 6px;
    border-radius: 20px;
    cursor: pointer;
    border: none;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sidebar-bottom-settings:hover {
    background: rgba(255,255,255,0.06);
  }
  .sidebar-bottom-settings img {
    width: 24px;
    height: 24px;
  }

  /* New Chat screen */
  .new-chat-screen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg-primary);
    z-index: 15;
    display: flex;
    flex-direction: column;
    transform: translateX(0);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  }
  .new-chat-screen.hidden {
    transform: translateX(100%);
  }

  .nc-navbar {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: linear-gradient(
      to bottom,
      rgba(24,24,25,0.84) 0%,
      rgba(24,24,25,0.6) 72%,
      rgba(24,24,25,0) 100%
    );
  }
  .nc-status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 21px 16px 0;
    height: 62px;
  }
  .nc-status-bar .time {
    font-size: 17px;
    font-weight: 600;
    color: white;
  }
  .nc-status-bar .status-icons {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .nc-status-bar .status-icons svg { height: 14px; fill: white; }

  .nc-header {
    height: 52px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    position: relative;
  }
  .nc-menu-btn {
    width: 44px;
    height: 44px;
    border-radius: 999px;
    background: #28292b;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.02), 0 8px 40px rgba(0,0,0,0.08);
  }
  .nc-menu-btn svg {
    width: 20px;
    height: 20px;
  }
  .nc-title {
    font-family: -apple-system, 'SF Pro', 'Helvetica Neue', sans-serif;
    font-size: 17px;
    font-weight: 600;
    font-style: normal;
    color: white;
    line-height: 22px;
    letter-spacing: 0;
    margin-left: 16px;
    filter: drop-shadow(0 0 6px rgba(24,24,25,0.6));
  }
  .nc-glasses-btn {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    background: #28292b;
    border: none;
    border-radius: 999px;
    padding: 11px 16px 11px 14px;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.02), 0 8px 40px rgba(0,0,0,0.08);
  }
  .nc-glasses-btn img {
    width: 22px;
    height: 22px;
  }
  .nc-glasses-btn span {
    font-size: 15px;
    font-weight: 500;
    color: white;
    line-height: 20px;
  }

  .nc-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 20px;
    gap: 20px;
  }
  .nc-greeting {
    font-family: -apple-system, 'SF Pro', 'Helvetica Neue', sans-serif;
    font-size: 22px;
    font-weight: 500;
    font-style: normal;
    color: white;
    line-height: 32px;
    letter-spacing: 0;
    padding-left: 8px;
  }
  .nc-starters {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .nc-card {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 8px 0;
    cursor: pointer;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
  }
  .nc-card:hover {
    opacity: 0.85;
  }
  .nc-card-icon {
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 12px;
  }
  .nc-card-icon img {
    width: 24px;
    height: 24px;
  }
  .nc-card-text {
    flex: 1;
    min-width: 0;
    padding-left: 8px;
  }
  .nc-card-title {
    font-size: 15px;
    font-weight: 500;
    color: white;
    line-height: 20px;
  }
  .nc-card-sub {
    font-size: 15px;
    font-weight: 400;
    color: rgba(242,247,255,0.53);
    line-height: 20px;
  }

  .nc-composer {
    flex-shrink: 0;
    background: #28292b;
    border-top: 1px solid #424344;
    border-radius: 28px 28px 0 0;
    padding: 12px 16px 28px;
    box-shadow: 0 -4px 4px rgba(0,0,0,0.02);
  }
  .nc-input {
    padding: 11px 2px;
    font-size: 17px;
    font-weight: 400;
    color: rgba(242,247,255,0.53);
    line-height: 22px;
  }
  .nc-buttons {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nc-btn-circle {
    width: 44px;
    height: 44px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.12);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .nc-btn-circle img {
    width: 20px;
    height: 20px;
  }
  .nc-btn-pill {
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 999px;
    background: transparent;
    padding: 12px 16px;
    font-size: 15px;
    font-weight: 500;
    color: white;
    line-height: 20px;
    cursor: pointer;
  }
  .nc-buttons-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

      </div>
      <div class="char-actions">
        <button class="vibe-btn" style="border-color: ${borderColor}">Vibe</button>
        <button class="action-btn">${actionIcon}</button>
      </div>
    </div>`;
  return wrap;
}

function addDivider() {
  const d = document.createElement('div');
  d.className = 'char-row-wrap';
  d.innerHTML = '<div class="divider"></div>';
  d.style.maxHeight = '1px';
  return d;
}

function renderDiscover() {
  const container = document.getElementById('discoverList');
  container.innerHTML = '';
  const list = allCharacters.filter(c => !favoriteNames.has(c.name));
  if (!list.length) {
    container.innerHTML = '<div class="empty-state">All characters favorited!</div>';
    return;
  }
  list.forEach((c, i) => {
    const row = buildRow(c, bookmarkSVG, 'var(--border-subtle)', true);
    row.querySelector('.action-btn').addEventListener('click', () => moveToFavorites(c.name, row));
    container.appendChild(row);
    if (i < list.length - 1) container.appendChild(addDivider());
  });
}

function renderFavorites() {
  const container = document.getElementById('favoritesList');
  container.innerHTML = '';
  const list = allCharacters.filter(c => favoriteNames.has(c.name));
  if (!list.length) {
    container.innerHTML = '<div class="empty-state">No favorites yet</div>';
    return;
  }
  list.forEach((c, i) => {
    const row = buildRow(c, closeSVG, 'rgba(241,246,255,0.38)', true);
    row.querySelector('.action-btn').addEventListener('click', () => removeFromFavorites(c.name, row));
    container.appendChild(row);
    if (i < list.length - 1) container.appendChild(addDivider());
  });
}

function renderMyAIs() {
  const container = document.getElementById('myaisList');
  container.innerHTML = '';
  allCharacters.forEach((c, i) => {
    const row = buildRow(c, caretRightSVG, 'rgba(241,246,255,0.38)', false);
    container.appendChild(row);
    if (i < allCharacters.length - 1) container.appendChild(addDivider());
  });
}

function animateRemoveRow(rowWrap, cb) {
  const prev = rowWrap.previousElementSibling;
  const next = rowWrap.nextElementSibling;
  const divider = (next && next.querySelector('.divider')) ? next
                : (prev && prev.querySelector('.divider')) ? prev
                : null;

  rowWrap.style.maxHeight = rowWrap.scrollHeight + 'px';
  if (divider) divider.style.maxHeight = divider.scrollHeight + 'px';

  requestAnimationFrame(() => {
    rowWrap.classList.add('removing');
    if (divider) divider.classList.add('removing');
  });

  setTimeout(() => {
    rowWrap.remove();
    if (divider) divider.remove();
    if (cb) cb();
  }, 380);
}

function moveToFavorites(name, rowWrap) {
  favoriteNames.add(name);
  animateRemoveRow(rowWrap, () => {
    renderFavorites();
  });
  const c = allCharacters.find(ch => ch.name === name);
  showToast(`${c.name} was moved to your favorites.`);
}

function removeFromFavorites(name, rowWrap) {
  favoriteNames.delete(name);
  animateRemoveRow(rowWrap, () => {
    renderDiscover();
  });
}

function renderFeatured() {
  const carousel = document.getElementById('featuredCarousel');
  carousel.innerHTML = `
    <div class="featured-slide active">
      <img class="featured-slide-img" src="images/featured-hot-take-harry.png" alt="Hot Take Harry">
    </div>`;
}
renderFeatured();
renderDiscover();
renderFavorites();
renderMyAIs();

// Tab switching
const segBtns = document.querySelectorAll('.seg-btn');
const segPill = document.getElementById('segPill');
const navRightBtn = document.getElementById('navRightBtn');

function activateTab(tabName) {
  segBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabName));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `tab-${tabName}`));

  const activeBtn = document.querySelector(`.seg-btn[data-tab="${tabName}"]`);
  segPill.style.left = activeBtn.offsetLeft + 'px';
  segPill.style.width = activeBtn.offsetWidth + 'px';

  navRightBtn.classList.toggle('hidden', tabName !== 'myais');
}

segBtns.forEach(btn => {
  btn.addEventListener('click', () => activateTab(btn.dataset.tab));
});

requestAnimationFrame(() => activateTab('discover'));

// Sidebar toggle
const sidebar = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebarOverlay');
const menuBtn = document.querySelector('.nav-btn[aria-label="Menu"]');

function openSidebar() {
  sidebar.classList.add('open');
  sidebarOverlay.classList.add('open');
}
function closeSidebar() {
  sidebar.classList.remove('open');
  sidebarOverlay.classList.remove('open');
}

menuBtn.addEventListener('click', openSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);

// New Chat screen
const newChatScreen = document.getElementById('newChatScreen');
const sidebarNewChat = document.getElementById('sidebarNewChat');
const ncMenuBtn = document.getElementById('ncMenuBtn');

function showNewChat() {
  closeSidebar();
  setTimeout(() => {
    newChatScreen.classList.remove('hidden');
  }, 50);
}

function hideNewChat() {
  newChatScreen.classList.add('hidden');
}

sidebarNewChat.addEventListener('click', showNewChat);

ncMenuBtn.addEventListener('click', () => {
  openSidebar();
});

// Also allow sidebar "AI Talkables" to go back to main screen
document.querySelectorAll('.sidebar-item').forEach(item => {
  const label = item.querySelector('.sidebar-item-label');
  if (label && label.textContent === 'AI Talkables') {
    item.addEventListener('click', () => {
      closeSidebar();
      hideNewChat();
    });
  }
});

// Swipe support for tabs
let startX = 0;
const tabs = ['discover', 'favorites', 'myais'];
const tabContent = document.querySelector('.tab-content');

tabContent.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
tabContent.addEventListener('touchend', e => {
  const diff = e.changedTouches[0].clientX - startX;
  if (Math.abs(diff) < 60) return;
  const current = tabs.indexOf(document.querySelector('.seg-btn.active').dataset.tab);
  if (diff < 0 && current < tabs.length - 1) activateTab(tabs[current + 1]);
  if (diff > 0 && current > 0) activateTab(tabs[current - 1]);
});

// === V2 DATA & LOGIC ===
const v2Characters = [
  {
    title: "Start Debating", category: "roleplay",
    desc: "Think you're right? Prove it. Debate with Hot Take Harry to sharpen your argument. Only if you can handle it.",
    hero: "images/card-hot-take-harry.png"
  },
  {
    title: "Get Fit Today", category: "coach",
    desc: "Your personal fitness coach who keeps you motivated with high energy and custom workout plans.",
    hero: "images/avatar-fitness-hammy.png"
  },
  {
    title: "Spin a Tale", category: "storyteller",
    desc: "Dive into whimsical worlds made of bubbles and fuzz. Every story is a new adventure waiting to unfold.",
    hero: "images/avatar-fuzz-bubbles.png"
  },
  {
    title: "Make Some Music", category: "creative",
    desc: "Write lyrics, find beats, and explore sound together. Your creative partner for all things music.",
    hero: "images/avatar-groove.png"
  },
  {
    title: "Solve a Mystery", category: "roleplay",
    desc: "Join a distinguished feline aristocrat in Victorian-era adventures. Every conversation is a new case to crack.",
    hero: "images/avatar-caterton.png"
  },
  {
    title: "Go on a Quest", category: "companion",
    desc: "A cheerful bunny knight who's always ready to chat, cheer you up, or embark on an imaginary quest.",
    hero: "images/avatar-sir-hoppsalot.png"
  },
  {
    title: "Live Luxuriously", category: "companion",
    desc: "Get life advice with style and charm from a luxury-loving panda who always keeps it classy.",
    hero: "images/avatar-captain-panda-luxe.png"
  },
];

const categoryLabels = {
  all: "All", coach: "Coach / Advisor", storyteller: "Storyteller",
  roleplay: "Roleplay Partner", creative: "Creative Partner", companion: "Companion"
};

const v2Favs = new Set();
let v2ActiveFilter = 'all';

const heartOutline = `<svg viewBox="0 0 24 24" fill="none"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" stroke="white" stroke-width="1.5" fill="none"/></svg>`;
const heartFilled = `<svg viewBox="0 0 24 24" fill="none"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="#FF4B4B" stroke="#FF4B4B" stroke-width="1.5"/></svg>`;

function renderV2Cards() {
  const container = document.getElementById('v2CardList');
  let chars = v2Characters;
  if (v2ActiveFilter === 'favorites') {
    chars = chars.filter(c => v2Favs.has(c.title));
  } else if (v2ActiveFilter !== 'all') {
    chars = chars.filter(c => c.category === v2ActiveFilter);
  }

  if (!chars.length) {
    const msg = v2ActiveFilter === 'favorites'
      ? 'No favorites yet.'
      : 'No talkables in this category yet.';
    container.innerHTML = `<div class="v2-empty">${msg}</div>`;
    return;
  }

  let html = '';
  chars.forEach(c => {
    const isFav = v2Favs.has(c.title);
    html += `
    <div class="v2-card">
      <img class="v2-card-img" src="${c.hero}" alt="${c.title}">
      <div class="v2-card-overlay"></div>
      <span class="v2-card-badge">${categoryLabels[c.category]}</span>
      <button class="v2-card-fav" data-title="${c.title}">${isFav ? heartFilled : heartOutline}</button>
      <div class="v2-card-content">
        <div class="v2-card-title">${c.title}</div>
        <div class="v2-card-desc">${c.desc}</div>
      </div>
    </div>`;
  });

  container.innerHTML = html;
  container.querySelectorAll('.v2-card-fav').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const title = btn.dataset.title;
      if (v2Favs.has(title)) v2Favs.delete(title); else v2Favs.add(title);
      renderV2Cards();
    });
  });
}

// V2 filter clicks
document.querySelectorAll('.v2-filter').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.v2-filter').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    v2ActiveFilter = btn.dataset.category;
    renderV2Cards();
  });
});

renderV2Cards();

// Version switcher
const versionBtns = document.querySelectorAll('.version-option');
let currentVersion = 'v1';

function setVersion(version) {
  currentVersion = version;
  versionBtns.forEach(btn => {
    btn.classList.toggle('active', btn.dataset.version === version);
  });

  const v1 = document.getElementById('v1Container');
  const v2 = document.getElementById('v2Container');
  if (version === 'v1') {
    v1.style.display = 'flex';
    v2.classList.remove('active');
  } else {
    v1.style.display = 'none';
    v2.classList.add('active');
  }
}

versionBtns.forEach(btn => {
  btn.addEventListener('click', () => setVersion(btn.dataset.version));
});
