<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Characters in Vibes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg-primary: #181819;
    --fill-secondary-elevated: rgba(255,255,255,0.12);
    --fill-primary-elevated: rgba(255,255,255,0.12);
    --fill-blur-thick: rgba(56,56,56,0.8);
    --text-primary: #fff;
    --text-secondary: rgba(242,247,255,0.53);
    --text-tertiary: rgba(241,246,255,0.38);
    --fill-highlight: rgba(255,255,255,0.06);
    --border-subtle: #686a6e;
  }

  body {
    font-family: -apple-system, 'SF Pro', 'Helvetica Neue', sans-serif;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .phone {
    width: 393px;
    height: 852px;
    background: var(--bg-primary);
    border-radius: 52px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.16);
  }

  .scroll-area {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 21px 16px 0;
    height: 62px;
    flex-shrink: 0;
  }
  .status-bar .time {
    font-size: 17px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .status-bar .status-icons {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .status-bar .status-icons svg { height: 14px; fill: white; }

  /* Navbar */
  .navbar {
    display: flex;
    align-items: center;
    padding: 0 16px;
    height: 52px;
    flex-shrink: 0;
    position: relative;
  }
  .nav-btn {
    width: 44px;
    height: 44px;
    border-radius: 999px;
    background: var(--fill-blur-thick);
    backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.02), 0 8px 40px rgba(0,0,0,0.08);
    border: none;
    cursor: pointer;
    flex-shrink: 0;
  }
  .nav-btn svg { width: 20px; height: 20px; }
  .nav-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--text-primary);
    margin-left: 16px;
  }
  .nav-right {
    margin-left: auto;
  }
  .nav-right.hidden { visibility: hidden; }

  /* Segmented control */
  .seg-control-wrap {
    padding: 12px 16px 0;
    flex-shrink: 0;
  }
  .seg-control {
    display: flex;
    background: var(--fill-secondary-elevated);
    border-radius: 1000px;
    padding: 4px;
    position: relative;
  }
  .seg-btn {
    flex: 1;
    height: 28px;
    min-width: 80px;
    border: none;
    background: transparent;
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 400;
    cursor: pointer;
    border-radius: 1000px;
    position: relative;
    z-index: 1;
    transition: font-weight 0.15s;
  }
  .seg-btn.active { font-weight: 500; }
  .seg-pill {
    position: absolute;
    top: 4px;
    height: 28px;
    border-radius: 1000px;
    background: var(--fill-primary-elevated);
    backdrop-filter: blur(18px);
    box-shadow: inset 0 1px 0 0 var(--fill-highlight),
                0 0 2px rgba(0,0,0,0.02), 0 0 6px rgba(0,0,0,0.03), 0 6px 30px rgba(0,0,0,0.07);
    transition: left 0.25s cubic-bezier(0.4, 0, 0.2, 1), width 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 0;
  }

  /* Tab content */
  .tab-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Section header */
  .section-header {
    padding: 6px 24px;
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 20px;
  }

  /* Featured card */
  .featured-section {
    padding-top: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .featured-carousel {
    width: 353px;
    height: 353px;
    position: relative;
    overflow: hidden;
    border-radius: 28px;
    box-shadow: 0 1px 1.5px rgba(0,0,0,0.02), 0 4px 10px rgba(0,0,0,0.04);
    cursor: pointer;
  }
  .featured-slide {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }
  .featured-slide.active { opacity: 1; pointer-events: auto; }
  .featured-slide-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .featured-dots {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
  }
  .featured-dot {
    width: 6px; height: 6px;
    border-radius: 44px;
    background: white;
    opacity: 0.3;
    transition: opacity 0.25s, width 0.25s, box-shadow 0.25s;
  }
  .featured-dot.active {
    opacity: 1;
    box-shadow: 0 0 8px rgba(255,255,255,0.7);
  }
  .featured-dot.small {
    width: 4px; height: 4px;
  }

  /* Character list */
  .char-list { padding: 0 20px; }
  .char-row {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 8px 0;
  }
  .char-avatar {
    width: 48px; height: 48px;
    border-radius: 99px;
    object-fit: cover;
    flex-shrink: 0;
    box-shadow: 0 0 2px rgba(0,0,0,0.02), 0 0 10px rgba(0,0,0,0.03), 0 10px 50px rgba(0,0,0,0.07);
  }
  .char-info {
    flex: 1;
    min-width: 0;
    padding-left: 8px;
  }
  .char-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 20px;
  }
  .char-author {
    font-size: 15px;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 20px;
  }
  .char-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .vibe-btn {
    width: 42px; height: 20px;
    border: 1px solid var(--border-subtle);
    border-radius: 6px;
    background: transparent;
    color: white;
    font-size: 11px;
    font-weight: 400;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 13px;
  }
  .action-btn {
    width: 36px; height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    cursor: pointer;
    border-radius: 50px;
  }
  .action-btn svg { width: 20px; height: 20px; }

  .divider {
    height: 0.5px;
    background: rgba(255,255,255,0.08);
  }

  .spacer-bottom { height: 40px; }

  /* Row animation */
  .char-row-wrap {
    overflow: hidden;
  }
  .char-row-wrap.removing {
    transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease-out;
    max-height: 0 !important;
    opacity: 0;
  }

  /* Empty state */
  .empty-state {
    padding: 60px 24px;
    text-align: center;
    color: var(--text-tertiary);
    font-size: 15px;
  }

  /* Toast */
  .toast {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--fill-blur-thick);
    backdrop-filter: blur(20px);
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 400;
    padding: 10px 20px;
    border-radius: 100px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 10;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Sidebar drawer */
  .sidebar-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .sidebar-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  .sidebar {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 317px;
    background: #28292b;
    z-index: 30;
    display: flex;
    flex-direction: column;
    transform: translateX(-100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  }
  .sidebar.open {
    transform: translateX(0);
  }

  .sidebar-nav {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 68px 10px 0;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    border-radius: 20px;
    cursor: pointer;
    border: none;

  }
  .sidebar-item:hover {
    background: rgba(255,255,255,0.06);
  }
  .sidebar-item.active {

  .sidebar-item-icon {
    width: 24px;
    height: 24px;
    flex-shrink: 0;

    justify-content: center;
  }
  .sidebar-item-icon img {
    width: 20px;
    height: 20px;
    object-fit: contain;
  }
  .sidebar-item-icon svg {
    width: 24px;
    height: 24px;
  }
  .sidebar-item-label {
    font-size: 16px;
    font-weight: 600;
    color: #f3f4f5;
    line-height: 24px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sidebar-sub-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px 6px 20px;
    border-radius: 20px;
    min-height: 36px;
    cursor: pointer;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
  }
  .sidebar-sub-item:hover {
    background: rgba(255,255,255,0.06);
  }
  .sidebar-sub-avatar {
    width: 24px;
    height: 24px;
    border-radius: 48px;
    object-fit: cover;
    flex-shrink: 0;
  }
  .sidebar-sub-label {
    font-size: 16px;
    font-weight: 600;
    color: #f3f4f5;
    line-height: 24px;
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sidebar-divider {
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 0 10px;
  }

  .sidebar-history {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 32px 10px 0;
  }
  .sidebar-history-label {
    font-size: 16px;
    font-weight: 600;
    color: #686a6e;
    line-height: 24px;
    padding: 8px 10px;
    height: 20px;
    display: flex;
    align-items: center;
  }
  .sidebar-history-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    border-radius: 20px;
    min-height: 36px;
    cursor: pointer;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
  }
  .sidebar-history-item:hover {
    background: rgba(255,255,255,0.06);
  }
  .sidebar-history-item.pinned {
    background: #28292b;
  }
  .sidebar-history-item-label {
    font-size: 17px;
    font-weight: 400;
    color: #f3f4f5;
    line-height: 22px;
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sidebar-history-item .sidebar-pin-icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }

  .sidebar-bottom {
    flex: 0 0 auto;
    height: 80px;
    border-top: 1px solid #323435;
    display: flex;
    align-items: flex-start;
    padding: 8px 10px 44px;
  }
  .sidebar-bottom-inner {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 6px 10px;
    border-radius: 20px;
    cursor: pointer;
    border: none;
    background: transparent;
  }
  .sidebar-bottom-inner:hover {
    background: rgba(255,255,255,0.06);
  }
  .sidebar-bottom-label {
    font-size: 16px;
    font-weight: 600;
    color: #f3f4f5;
    line-height: 24px;
    flex: 1;
  }
  .sidebar-bottom-profile {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
  }
</style>
</head>

  { name: "Captain Panda Luxe", author: "apratt", avatar: "images/avatar-captain-panda-luxe.png" },
  { name: "Fitness Hammy", author: "Doodles32", avatar: "images/avatar-fitness-hammy.png" },
  { name: "Fuzz Bubbles", author: "pizzaslime", avatar: "images/avatar-fuzz-bubbles.png" },
  { name: "Groove", author: "max860113", avatar: "images/avatar-groove.png" },
  { name: "Caterton IV", author: "jzhwu_", avatar: "images/avatar-caterton.png" },
  { name: "Sir Hoppsalot", author: "Blumen", avatar: "images/avatar-sir-hoppsalot.png" },
];

const favoriteNames = new Set();

const bookmarkSVG = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none">
  <path d="M6 4.5C6 3.67 6.67 3 7.5 3h9c.83 0 1.5.67 1.5 1.5V21l-6-4-6 4V4.5z" stroke="rgba(242,247,255,0.53)" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
  <path d="M10 21h4v-2h-4v2z" fill="#181819"/>
</svg>`;

const closeSVG = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none">
  <path d="M6.7 6.7l10.6 10.6M17.3 6.7L6.7 17.3" stroke="rgba(242,247,255,0.53)" stroke-width="1.6" stroke-linecap="round"/>
</svg>`;

const caretRightSVG = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none">
  <path d="M9 6l6 6-6 6" stroke="rgba(242,247,255,0.53)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('visible');
  clearTimeout(el._tid);
  el._tid = setTimeout(() => el.classList.remove('visible'), 2500);
}

function buildRow(c, actionIcon, borderColor, showAuthor) {
  const wrap = document.createElement('div');
  wrap.className = 'char-row-wrap';
  wrap.innerHTML = `
    <div class="char-row">
      <img class="char-avatar" src="${c.avatar}" alt="${c.name}">
      <div class="char-info">
        <div class="char-name">${c.name}</div>
        ${showAuthor ? `<div class="char-author">by ${c.author}</div>` : ''}
      </div>
      <div class="char-actions">
        <button class="vibe-btn" style="border-color: ${borderColor}">Vibe</button>
        <button class="action-btn">${actionIcon}</button>
      </div>
    </div>`;
  return wrap;
}

function addDivider() {
  const d = document.createElement('div');
  d.className = 'char-row-wrap';
  d.innerHTML = '<div class="divider"></div>';
  d.style.maxHeight = '1px';
  return d;
}

function renderDiscover() {
  const container = document.getElementById('discoverList');
  container.innerHTML = '';
  const list = allCharacters.filter(c => !favoriteNames.has(c.name));
  if (!list.length) {
    container.innerHTML = '<div class="empty-state">All characters favorited!</div>';
    return;
  }
  list.forEach((c, i) => {
    const row = buildRow(c, bookmarkSVG, 'var(--border-subtle)', true);
    row.querySelector('.action-btn').addEventListener('click', () => moveToFavorites(c.name, row));
    container.appendChild(row);
    if (i < list.length - 1) container.appendChild(addDivider());
  });
}

function renderFavorites() {
  const container = document.getElementById('favoritesList');
  container.innerHTML = '';
  const list = allCharacters.filter(c => favoriteNames.has(c.name));
  if (!list.length) {
    container.innerHTML = '<div class="empty-state">No favorites yet</div>';
    return;
  }
  list.forEach((c, i) => {
    const row = buildRow(c, closeSVG, 'rgba(241,246,255,0.38)', true);
    row.querySelector('.action-btn').addEventListener('click', () => removeFromFavorites(c.name, row));
    container.appendChild(row);
    if (i < list.length - 1) container.appendChild(addDivider());
  });
}

function renderMyAIs() {
  const container = document.getElementById('myaisList');
  container.innerHTML = '';
  allCharacters.forEach((c, i) => {
    const row = buildRow(c, caretRightSVG, 'rgba(241,246,255,0.38)', false);
    container.appendChild(row);
    if (i < allCharacters.length - 1) container.appendChild(addDivider());
  });
}

function animateRemoveRow(rowWrap, cb) {
  const prev = rowWrap.previousElementSibling;
  const next = rowWrap.nextElementSibling;
  const divider = (next && next.querySelector('.divider')) ? next
                : (prev && prev.querySelector('.divider')) ? prev
                : null;

  rowWrap.style.maxHeight = rowWrap.scrollHeight + 'px';
  if (divider) divider.style.maxHeight = divider.scrollHeight + 'px';

  requestAnimationFrame(() => {
    rowWrap.classList.add('removing');
    if (divider) divider.classList.add('removing');
  });

  setTimeout(() => {
    rowWrap.remove();
    if (divider) divider.remove();
    if (cb) cb();
  }, 380);
}

function moveToFavorites(name, rowWrap) {
  favoriteNames.add(name);
  animateRemoveRow(rowWrap, () => {
    renderFavorites();
  });
  const c = allCharacters.find(ch => ch.name === name);
  showToast(`${c.name} was moved to your favorites.`);
}

function removeFromFavorites(name, rowWrap) {
  favoriteNames.delete(name);
  animateRemoveRow(rowWrap, () => {
    renderDiscover();
  });
}

function renderFeatured() {
  const carousel = document.getElementById('featuredCarousel');
  carousel.innerHTML = `
    <div class="featured-slide active">
      <img class="featured-slide-img" src="images/featured-hot-take-harry.png" alt="Hot Take Harry">
    </div>`;
}
renderFeatured();
renderDiscover();
renderFavorites();
renderMyAIs();

// Tab switching
const segBtns = document.querySelectorAll('.seg-btn');
const segPill = document.getElementById('segPill');
const navRightBtn = document.getElementById('navRightBtn');

function activateTab(tabName) {
  segBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabName));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `tab-${tabName}`));

  const activeBtn = document.querySelector(`.seg-btn[data-tab="${tabName}"]`);
  segPill.style.left = activeBtn.offsetLeft + 'px';
  segPill.style.width = activeBtn.offsetWidth + 'px';

  navRightBtn.classList.toggle('hidden', tabName !== 'myais');
}

segBtns.forEach(btn => {
  btn.addEventListener('click', () => activateTab(btn.dataset.tab));
});

requestAnimationFrame(() => activateTab('discover'));

// Sidebar toggle
const sidebar = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebarOverlay');
const menuBtn = document.querySelector('.nav-btn[aria-label="Menu"]');

function openSidebar() {
  sidebar.classList.add('open');
  sidebarOverlay.classList.add('open');
}
function closeSidebar() {
  sidebar.classList.remove('open');
  sidebarOverlay.classList.remove('open');
}

menuBtn.addEventListener('click', openSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);

// Swipe support for tabs
let startX = 0;
const tabs = ['discover', 'favorites', 'myais'];
const tabContent = document.querySelector('.tab-content');

tabContent.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
tabContent.addEventListener('touchend', e => {
  const diff = e.changedTouches[0].clientX - startX;
  if (Math.abs(diff) < 60) return;
  const current = tabs.indexOf(document.querySelector('.seg-btn.active').dataset.tab);
  if (diff < 0 && current < tabs.length - 1) activateTab(tabs[current + 1]);
  if (diff > 0 && current > 0) activateTab(tabs[current - 1]);
});

</script>

</body>
</html>
