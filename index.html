<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Characters in Vibes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg-primary: #181819;
    --fill-secondary-elevated: rgba(255,255,255,0.12);
    --fill-primary-elevated: rgba(255,255,255,0.12);
    --fill-blur-thick: rgba(56,56,56,0.8);
    --text-primary: #fff;
    --text-secondary: rgba(242,247,255,0.53);
    --text-tertiary: rgba(241,246,255,0.38);
    --fill-highlight: rgba(255,255,255,0.06);
    --border-subtle: #686a6e;
  }

  body {
    font-family: -apple-system, 'SF Pro', 'Helvetica Neue', sans-serif;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .phone {
    width: 393px;
    height: 852px;
    background: var(--bg-primary);
    border-radius: 52px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.16);
  }

  .scroll-area {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 21px 16px 0;
    height: 62px;
    flex-shrink: 0;
  }
  .status-bar .time {
    font-size: 17px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .status-bar .status-icons {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .status-bar .status-icons svg { height: 14px; fill: white; }

  /* Navbar */
  .navbar {
    display: flex;
    align-items: center;
    padding: 0 16px;
    height: 52px;
    flex-shrink: 0;
    position: relative;
  }
  .nav-btn {
    width: 44px;
    height: 44px;
    border-radius: 999px;
    background: var(--fill-blur-thick);
    backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.02), 0 8px 40px rgba(0,0,0,0.08);
    border: none;
    cursor: pointer;
    flex-shrink: 0;
  }
  .nav-btn svg { width: 20px; height: 20px; }
  .nav-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--text-primary);
    margin-left: 16px;
  }
  .nav-right {
    margin-left: auto;
  }
  .nav-right.hidden { visibility: hidden; }

  /* Segmented control */
  .seg-control-wrap {
    padding: 12px 16px 0;
    flex-shrink: 0;
  }
  .seg-control {
    display: flex;
    background: var(--fill-secondary-elevated);
    border-radius: 1000px;
    padding: 4px;
    position: relative;
  }
  .seg-btn {
    flex: 1;
    height: 28px;
    min-width: 80px;
    border: none;
    background: transparent;
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 400;
    cursor: pointer;
    border-radius: 1000px;
    position: relative;
    z-index: 1;
    transition: font-weight 0.15s;
  }
  .seg-btn.active { font-weight: 500; }
  .seg-pill {
    position: absolute;
    top: 4px;
    height: 28px;
    border-radius: 1000px;
    background: var(--fill-primary-elevated);
    backdrop-filter: blur(18px);
    box-shadow: inset 0 1px 0 0 var(--fill-highlight),
                0 0 2px rgba(0,0,0,0.02), 0 0 6px rgba(0,0,0,0.03), 0 6px 30px rgba(0,0,0,0.07);
    transition: left 0.25s cubic-bezier(0.4, 0, 0.2, 1), width 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 0;
  }

  /* Tab content */
  .tab-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Section header */
  .section-header {
    padding: 6px 24px;
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 20px;
  }

  /* Featured carousel */
  .featured-section { padding-top: 8px; }
  .featured-scroll {
    display: flex;
    gap: 12px;
    padding: 0 24px 8px;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .featured-scroll::-webkit-scrollbar { display: none; }
  .featured-card {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }
  .featured-avatar {
    width: 104px;
    height: 130px;
    border-radius: 100px;
    object-fit: cover;
    box-shadow: 0 -4px 4px rgba(0,0,0,0.02);
    transition: transform 0.2s;
  }
  .featured-card:active .featured-avatar { transform: scale(0.96); }
  .featured-name {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-secondary);
    text-align: center;
    width: 104px;
    line-height: 18px;
  }

  /* Character list */
  .char-list { padding: 0 20px; }
  .char-row {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 8px 0;
  }
  .char-avatar {
    width: 48px; height: 48px;
    border-radius: 99px;
    object-fit: cover;
    flex-shrink: 0;
    box-shadow: 0 0 2px rgba(0,0,0,0.02), 0 0 10px rgba(0,0,0,0.03), 0 10px 50px rgba(0,0,0,0.07);
  }
  .char-info {
    flex: 1;
    min-width: 0;
    padding-left: 8px;
  }
  .char-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 20px;
  }
  .char-author {
    font-size: 15px;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 20px;
  }
  .char-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .vibe-btn {
    width: 42px; height: 20px;
    border: 1px solid var(--border-subtle);
    border-radius: 6px;
    background: transparent;
    color: white;
    font-size: 11px;
    font-weight: 400;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 13px;
  }
  .action-btn {
    width: 36px; height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    cursor: pointer;
    border-radius: 50px;
  }
  .action-btn svg { width: 20px; height: 20px; }

  .divider {
    height: 0.5px;
    background: rgba(255,255,255,0.08);
  }

  .spacer-bottom { height: 40px; }

  /* Row animation */
  .char-row-wrap {
    overflow: hidden;
  }
  .char-row-wrap.removing {
    transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease-out;
    max-height: 0 !important;
    opacity: 0;
  }

  /* Empty state */
  .empty-state {
    padding: 60px 24px;
    text-align: center;
    color: var(--text-tertiary);
    font-size: 15px;
  }

  /* Toast */
  .toast {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--fill-blur-thick);
    backdrop-filter: blur(20px);
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 400;
    padding: 10px 20px;
    border-radius: 100px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 10;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="phone">
  <div class="scroll-area">

    <!-- Status bar -->
    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="status-icons">
        <svg viewBox="0 0 18 12"><path d="M1 3.5C1 2.67 1.67 2 2.5 2h0C3.33 2 4 2.67 4 3.5v5C4 9.33 3.33 10 2.5 10h0C1.67 10 1 9.33 1 8.5v-5zM5.5 2C5.5 1.17 6.17.5 7 .5h0c.83 0 1.5.67 1.5 1.5v8c0 .83-.67 1.5-1.5 1.5h0c-.83 0-1.5-.67-1.5-1.5V2zM10 4.5c0-.83.67-1.5 1.5-1.5h0c.83 0 1.5.67 1.5 1.5v3.5c0 .83-.67 1.5-1.5 1.5h0c-.83 0-1.5-.67-1.5-1.5V4.5zM14.5 5.5c0-.55.45-1 1-1h0c.55 0 1 .45 1 1v1c0 .55-.45 1-1 1h0c-.55 0-1-.45-1-1v-1z"/></svg>
        <svg viewBox="0 0 16 12"><path d="M8 2.4C5.6 2.4 3.4 3.4 1.8 5l1.4 1.4C4.4 5.2 6.1 4.4 8 4.4s3.6.8 4.8 2l1.4-1.4C12.6 3.4 10.4 2.4 8 2.4zM8 6.4c-1.4 0-2.6.6-3.4 1.4L6 9.2c.5-.5 1.2-.8 2-.8s1.5.3 2 .8l1.4-1.4C10.6 7 9.4 6.4 8 6.4zM8 10.4c-.6 0-1 .4-1 1s.4 1 1 1 1-.4 1-1-.4-1-1-1z"/></svg>
        <svg viewBox="0 0 28 14"><rect x="0.5" y="0.5" width="22" height="13" rx="3.5" stroke="white" stroke-opacity="0.35" fill="none"/><rect x="24" y="4" width="2.5" height="5" rx="1.25" fill="white" fill-opacity="0.4"/><rect x="2" y="2" width="19" height="9" rx="2" fill="white"/></svg>
      </div>
    </div>

    <!-- Navbar -->
    <div class="navbar">
      <!-- menu-2-lines icon -->
      <button class="nav-btn" aria-label="Menu">
        <svg width="20" height="20" viewBox="0 0 32 32" fill="none">
          <rect x="5.6" y="10" width="20.8" height="2.4" rx="1.2" fill="white"/>
          <rect x="5.6" y="19.6" width="20.8" height="2.4" rx="1.2" fill="white"/>
        </svg>
      </button>
      <span class="nav-title">AIs</span>
      <!-- controls-slider-2 icon -->
      <button class="nav-btn nav-right" id="navRightBtn" aria-label="Settings">
        <svg width="20" height="20" viewBox="0 0 32 32" fill="none">
          <line x1="5" y1="9" x2="27" y2="9" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="5" y1="16" x2="27" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="5" y1="23" x2="27" y2="23" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="12" cy="9" r="2.8" fill="#181819" stroke="white" stroke-width="1.8"/>
          <circle cx="20" cy="16" r="2.8" fill="#181819" stroke="white" stroke-width="1.8"/>
          <circle cx="12" cy="23" r="2.8" fill="#181819" stroke="white" stroke-width="1.8"/>
        </svg>
      </button>
    </div>

    <!-- Segmented control -->
    <div class="seg-control-wrap">
      <div class="seg-control" id="segControl">
        <div class="seg-pill" id="segPill"></div>
        <button class="seg-btn active" data-tab="discover">Discover</button>
        <button class="seg-btn" data-tab="favorites">Favorites</button>
        <button class="seg-btn" data-tab="myais">My AIs</button>
      </div>
    </div>

    <!-- Tab panels -->
    <div class="tab-content">

      <!-- DISCOVER TAB -->
      <div class="tab-panel active" id="tab-discover">
        <div class="featured-section">
          <div class="section-header">Featured from Meta</div>
          <div class="featured-scroll">
            <div class="featured-card">
              <img class="featured-avatar" src="https://www.figma.com/api/mcp/asset/f9549ae5-261d-4a5f-b167-ed8144bec682" alt="Hot Take Harry">
              <span class="featured-name">Hot Take Harry</span>
            </div>
            <div class="featured-card">
              <img class="featured-avatar" src="https://www.figma.com/api/mcp/asset/891daec7-4419-4968-a413-1929e62f129e" alt="Emma">
              <span class="featured-name">Emma</span>
            </div>
            <div class="featured-card">
              <img class="featured-avatar" src="https://www.figma.com/api/mcp/asset/43820b1c-1392-4fd9-b406-0e23b6f77c80" alt="Annabelle">
              <span class="featured-name">Annabelle</span>
            </div>
            <div class="featured-card">
              <img class="featured-avatar" src="https://www.figma.com/api/mcp/asset/7c276368-893f-46e3-93ae-f9c321225cd0" alt="Madame Claire">
              <span class="featured-name">Madame Claire</span>
            </div>
          </div>
        </div>

        <div class="section-header" style="margin-top: 8px;">Recent from Vibes</div>
        <div class="char-list" id="discoverList"></div>
        <div class="spacer-bottom"></div>
      </div>

      <!-- FAVORITES TAB -->
      <div class="tab-panel" id="tab-favorites">
        <div style="height: 12px;"></div>
        <div class="char-list" id="favoritesList"></div>
        <div class="spacer-bottom"></div>
      </div>

      <!-- MY AIs TAB -->
      <div class="tab-panel" id="tab-myais">
        <div class="section-header" style="margin-top: 8px;">From My Vibes</div>
        <div class="char-list" id="myaisList"></div>
        <div class="spacer-bottom"></div>
      </div>

    </div>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script>
const allCharacters = [
  { name: "Captain Panda Luxe", author: "apratt", avatar: "https://www.figma.com/api/mcp/asset/3e678f53-0820-4dc8-88ec-ce56bd019864" },
  { name: "Fitness Hammy", author: "Doodles32", avatar: "https://www.figma.com/api/mcp/asset/0d43f7e5-56ef-4cb8-b95d-52fd8f517858" },
  { name: "Fuzz Bubbles", author: "pizzaslime", avatar: "https://www.figma.com/api/mcp/asset/c001878c-3150-445c-8828-0dd8eef4c600" },
  { name: "Groove", author: "max860113", avatar: "https://www.figma.com/api/mcp/asset/d5455c1d-3ad8-47e4-a1b0-b3e73b1f90ba" },
  { name: "Caterton IV", author: "jzhwu_", avatar: "https://www.figma.com/api/mcp/asset/76e36da2-69ac-40f2-ab4b-a085c9ba5369" },
  { name: "Sir Hoppsalot", author: "Blumen", avatar: "https://www.figma.com/api/mcp/asset/0d331500-15da-4d86-928c-319d5ef3ecc0" },
];

const favoriteNames = new Set();

const bookmarkSVG = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none">
  <path d="M6 4.5C6 3.67 6.67 3 7.5 3h9c.83 0 1.5.67 1.5 1.5V21l-6-4-6 4V4.5z" stroke="rgba(242,247,255,0.53)" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
  <path d="M10 21h4v-2h-4v2z" fill="#181819"/>
</svg>`;

const closeSVG = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none">
  <path d="M6.7 6.7l10.6 10.6M17.3 6.7L6.7 17.3" stroke="rgba(242,247,255,0.53)" stroke-width="1.6" stroke-linecap="round"/>
</svg>`;

const caretRightSVG = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none">
  <path d="M9 6l6 6-6 6" stroke="rgba(242,247,255,0.53)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('visible');
  clearTimeout(el._tid);
  el._tid = setTimeout(() => el.classList.remove('visible'), 2500);
}

function buildRow(c, actionIcon, borderColor, showAuthor) {
  const wrap = document.createElement('div');
  wrap.className = 'char-row-wrap';
  wrap.innerHTML = `
    <div class="char-row">
      <img class="char-avatar" src="${c.avatar}" alt="${c.name}">
      <div class="char-info">
        <div class="char-name">${c.name}</div>
        ${showAuthor ? `<div class="char-author">by ${c.author}</div>` : ''}
      </div>
      <div class="char-actions">
        <button class="vibe-btn" style="border-color: ${borderColor}">Vibe</button>
        <button class="action-btn">${actionIcon}</button>
      </div>
    </div>`;
  return wrap;
}

function addDivider() {
  const d = document.createElement('div');
  d.className = 'char-row-wrap';
  d.innerHTML = '<div class="divider"></div>';
  d.style.maxHeight = '1px';
  return d;
}

function renderDiscover() {
  const container = document.getElementById('discoverList');
  container.innerHTML = '';
  const list = allCharacters.filter(c => !favoriteNames.has(c.name));
  if (!list.length) {
    container.innerHTML = '<div class="empty-state">All characters favorited!</div>';
    return;
  }
  list.forEach((c, i) => {
    const row = buildRow(c, bookmarkSVG, 'var(--border-subtle)', true);
    row.querySelector('.action-btn').addEventListener('click', () => moveToFavorites(c.name, row));
    container.appendChild(row);
    if (i < list.length - 1) container.appendChild(addDivider());
  });
}

function renderFavorites() {
  const container = document.getElementById('favoritesList');
  container.innerHTML = '';
  const list = allCharacters.filter(c => favoriteNames.has(c.name));
  if (!list.length) {
    container.innerHTML = '<div class="empty-state">No favorites yet</div>';
    return;
  }
  list.forEach((c, i) => {
    const row = buildRow(c, closeSVG, 'rgba(241,246,255,0.38)', true);
    row.querySelector('.action-btn').addEventListener('click', () => removeFromFavorites(c.name, row));
    container.appendChild(row);
    if (i < list.length - 1) container.appendChild(addDivider());
  });
}

function renderMyAIs() {
  const container = document.getElementById('myaisList');
  container.innerHTML = '';
  allCharacters.forEach((c, i) => {
    const row = buildRow(c, caretRightSVG, 'rgba(241,246,255,0.38)', false);
    container.appendChild(row);
    if (i < allCharacters.length - 1) container.appendChild(addDivider());
  });
}

function animateRemoveRow(rowWrap, cb) {
  const prev = rowWrap.previousElementSibling;
  const next = rowWrap.nextElementSibling;
  const divider = (next && next.querySelector('.divider')) ? next
                : (prev && prev.querySelector('.divider')) ? prev
                : null;

  rowWrap.style.maxHeight = rowWrap.scrollHeight + 'px';
  if (divider) divider.style.maxHeight = divider.scrollHeight + 'px';

  requestAnimationFrame(() => {
    rowWrap.classList.add('removing');
    if (divider) divider.classList.add('removing');
  });

  setTimeout(() => {
    rowWrap.remove();
    if (divider) divider.remove();
    if (cb) cb();
  }, 380);
}

function moveToFavorites(name, rowWrap) {
  favoriteNames.add(name);
  animateRemoveRow(rowWrap, () => {
    renderFavorites();
  });
  const c = allCharacters.find(ch => ch.name === name);
  showToast(`${c.name} was moved to your favorites.`);
}

function removeFromFavorites(name, rowWrap) {
  favoriteNames.delete(name);
  animateRemoveRow(rowWrap, () => {
    renderDiscover();
  });
}

renderDiscover();
renderFavorites();
renderMyAIs();

// Tab switching
const segBtns = document.querySelectorAll('.seg-btn');
const segPill = document.getElementById('segPill');
const navRightBtn = document.getElementById('navRightBtn');

function activateTab(tabName) {
  segBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabName));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `tab-${tabName}`));

  const activeBtn = document.querySelector(`.seg-btn[data-tab="${tabName}"]`);
  segPill.style.left = activeBtn.offsetLeft + 'px';
  segPill.style.width = activeBtn.offsetWidth + 'px';

  navRightBtn.classList.toggle('hidden', tabName !== 'myais');
}

segBtns.forEach(btn => {
  btn.addEventListener('click', () => activateTab(btn.dataset.tab));
});

requestAnimationFrame(() => activateTab('discover'));

// Swipe support for tabs
let startX = 0;
const tabs = ['discover', 'favorites', 'myais'];
const tabContent = document.querySelector('.tab-content');

tabContent.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
tabContent.addEventListener('touchend', e => {
  const diff = e.changedTouches[0].clientX - startX;
  if (Math.abs(diff) < 60) return;
  const current = tabs.indexOf(document.querySelector('.seg-btn.active').dataset.tab);
  if (diff < 0 && current < tabs.length - 1) activateTab(tabs[current + 1]);
  if (diff > 0 && current > 0) activateTab(tabs[current - 1]);
});

</script>

</body>
</html>
